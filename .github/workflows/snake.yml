name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: Vhirazhr
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=FF00FF&color_dots=3b0a45,6a0dad,b026ff,ff4dff,ff99ff
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=FF00FF&color_dots=3b0a45,6a0dad,b026ff,ff4dff,ff99ff

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
